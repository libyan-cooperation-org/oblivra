version: '3'

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  linux: ./build/linux/Taskfile.yml
  agent: ./build/agent/Taskfile.yml

vars:
  APP_NAME: "oblivrashell"
  BIN_DIR: "bin"
  VITE_PORT: '{{.WAILS_VITE_PORT | default 9245}}'

tasks:
  # The 'build' task is removed to avoid recursion. 
  # Use 'wails3 build' directly for the main application.

  package:
    summary: Packages a production build of the application
    cmds:
      - task: "windows:package" # Package remains windows focused for now as per original intent

  run:
    summary: Runs the application
    cmds:
      - task: clean:ports
      - task: "{{OS}}:run"

  dev:
    summary: Runs the application in development mode
    cmds:
      - task: clean:ports
      - wails3 dev -port {{.VITE_PORT}}

  clean:ports:
    summary: Kills processes on OBLIVRA standard ports
    internal: true
    cmds:
      - powershell -Command "Stop-Process -Id (Get-NetTCPConnection -LocalPort 9090 -ErrorAction SilentlyContinue).OwningProcess -ErrorAction SilentlyContinue"
      - powershell -Command "Stop-Process -Id (Get-NetTCPConnection -LocalPort 6060 -ErrorAction SilentlyContinue).OwningProcess -ErrorAction SilentlyContinue"
      - powershell -Command "Stop-Process -Id (Get-NetTCPConnection -LocalPort 8080 -ErrorAction SilentlyContinue).OwningProcess -ErrorAction SilentlyContinue"
      - powershell -Command "Stop-Process -Id (Get-NetTCPConnection -LocalPort 8443 -ErrorAction SilentlyContinue).OwningProcess -ErrorAction SilentlyContinue"

  setup:docker:
    cmds:
      - task: common:setup:docker

  build:server:
    cmds:
      - task: common:build:server

  run:server:
    cmds:
      - task: common:run:server

  build:docker:
    cmds:
      - task: common:build:docker

  run:docker:
    cmds:
      - task: common:run:docker
