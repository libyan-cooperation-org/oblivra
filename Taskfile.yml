version: '3'

# OBLIVRA build commands. Install Task: https://taskfile.dev/installation/
# Run `task --list` to see all targets.

vars:
  BIN_DIR: ./build/bin
  LDFLAGS: '-w -s'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  install:
    desc: Install all dependencies (Go modules + frontend)
    cmds:
      - go mod tidy
      - task: frontend:install

  frontend:install:
    desc: Install frontend dependencies
    dir: frontend
    cmds:
      - npm install

  frontend:dev:
    desc: Run Vite dev server (browser preview at http://localhost:5173)
    dir: frontend
    cmds:
      - npm run dev

  frontend:build:
    desc: Build production frontend bundle into webassets/dist
    dir: frontend
    cmds:
      - npm run build

  frontend:check:
    desc: Type-check Svelte components
    dir: frontend
    cmds:
      - npm run check

  desktop:dev:
    desc: Run Wails v3 desktop shell with hot-reload
    cmds:
      - wails3 dev

  desktop:build:
    desc: Build production desktop binary
    deps: [frontend:build]
    cmds:
      - wails3 build

  server:run:
    desc: Run headless REST server (browser UI at http://localhost:8080)
    deps: [frontend:build]
    cmds:
      - go run ./cmd/server

  server:build:
    desc: Build production headless server binary
    deps: [frontend:build]
    cmds:
      - go build -trimpath -ldflags "{{.LDFLAGS}}" -o {{.BIN_DIR}}/oblivra-server ./cmd/server

  test:
    desc: Run Go tests
    cmds:
      - go test ./...

  test:race:
    desc: Run Go tests with race detector
    cmds:
      - go test -race ./...

  fmt:
    desc: Format Go code
    cmds:
      - gofmt -w .
      - go vet ./...

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf build/bin webassets/dist/* frontend/node_modules
      - mkdir -p webassets/dist
      - 'echo "<!doctype html><html><body>placeholder</body></html>" > webassets/dist/index.html'
