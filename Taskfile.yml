version: '3'

# OBLIVRA build commands. Install Task: https://taskfile.dev/installation/
# Run `task --list` to see all targets.
#
# OBLIVRA is web-only — `task build` produces the headless server. The
# Wails desktop shell was retired in favour of running the server behind
# a VPN and reaching the UI via browser.

vars:
  BIN_DIR: ./build/bin
  LDFLAGS: '-w -s'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # ---- Top-level entry points -------------------------------------------

  dev:
    desc: Run the server locally with a live frontend rebuild step
    cmds:
      - task: frontend:install
      - task: build:frontend:dev
      - go run ./cmd/server

  build:
    desc: Build the headless server with the embedded frontend
    cmds:
      - task: server:build

  # ---- Frontend ---------------------------------------------------------

  build:frontend:
    desc: Build production Svelte bundle into webassets/dist
    dir: frontend
    cmds:
      - npm install
      - npm run build

  build:frontend:dev:
    desc: One-off frontend build so dev start doesn't 404
    dir: frontend
    cmds:
      - npm install
      - npm run build

  frontend:install:
    desc: Install frontend dependencies
    dir: frontend
    cmds:
      - npm install

  frontend:dev:
    desc: Run Vite dev server (browser preview at http://localhost:5173)
    dir: frontend
    cmds:
      - npm run dev

  frontend:check:
    desc: Type-check Svelte components
    dir: frontend
    cmds:
      - npm run check

  # ---- Server / CLI / Agent ---------------------------------------------

  server:run:
    desc: Run headless REST server (browser UI at http://localhost:8080)
    deps: [build:frontend]
    cmds:
      - go run ./cmd/server

  server:build:
    desc: Build production headless server binary
    deps: [build:frontend]
    cmds:
      - go run ./tools/ensure-dir {{.BIN_DIR}}
      - go build -trimpath -ldflags "{{.LDFLAGS}}" -o {{.BIN_DIR}}/oblivra-server ./cmd/server

  cli:build:
    desc: Build oblivra-cli
    cmds:
      - go run ./tools/ensure-dir {{.BIN_DIR}}
      - go build -trimpath -ldflags "{{.LDFLAGS}}" -o {{.BIN_DIR}}/oblivra-cli ./cmd/cli

  agent:build:
    desc: Build oblivra-agent (log-tailing forwarder)
    cmds:
      - go run ./tools/ensure-dir {{.BIN_DIR}}
      - go build -trimpath -ldflags "{{.LDFLAGS}}" -o {{.BIN_DIR}}/oblivra-agent ./cmd/agent

  verify:build:
    desc: Build oblivra-verify (offline integrity verifier)
    cmds:
      - go run ./tools/ensure-dir {{.BIN_DIR}}
      - go build -trimpath -ldflags "{{.LDFLAGS}}" -o {{.BIN_DIR}}/oblivra-verify ./cmd/verify

  migrate:build:
    desc: Build oblivra-migrate (schema migration runner)
    cmds:
      - go run ./tools/ensure-dir {{.BIN_DIR}}
      - go build -trimpath -ldflags "{{.LDFLAGS}}" -o {{.BIN_DIR}}/oblivra-migrate ./cmd/migrate

  tools:build:
    desc: Build every binary (server + cli + agent + verify + migrate + soak + smoke)
    cmds:
      - task: server:build
      - task: cli:build
      - task: agent:build
      - task: verify:build
      - task: migrate:build
      - task: soak:build
      - task: smoke:build

  soak:build:
    desc: Build oblivra-soak
    cmds:
      - go run ./tools/ensure-dir {{.BIN_DIR}}
      - go build -trimpath -ldflags "{{.LDFLAGS}}" -o {{.BIN_DIR}}/oblivra-soak ./cmd/soak

  soak:run:
    desc: Boot a clean server, run sustained-load soak, archive a credibility-grade markdown report
    vars:
      EPS: '{{.EPS | default "1000"}}'
      DURATION: '{{.DURATION | default "60s"}}'
      HARDWARE: '{{.HARDWARE | default ""}}'
    cmds:
      - 'echo "Running soak: {{.EPS}} EPS for {{.DURATION}} on {{.HARDWARE}}"'
      - bash scripts/run-soak.sh "{{.EPS}}" "{{.DURATION}}" "{{.HARDWARE}}"

  smoke:build:
    desc: Build oblivra-smoke
    cmds:
      - go run ./tools/ensure-dir {{.BIN_DIR}}
      - go build -trimpath -ldflags "{{.LDFLAGS}}" -o {{.BIN_DIR}}/oblivra-smoke ./cmd/smoke

  installer:windows:
    desc: Build the Windows installer (NSIS) — produces build/windows/installer/OBLIVRA-Setup-<version>.exe
    deps: [server:build, agent:build, cli:build, verify:build, migrate:build, smoke:build, soak:build]
    vars:
      VERSION: '{{.VERSION | default "0.1.0-beta1"}}'
    cmds:
      - 'echo "Compiling NSIS installer for v{{.VERSION}}..."'
      - 'makensis -DVERSION={{.VERSION}} build/windows/installer/oblivra.nsi'

  release:linux:
    desc: Build the Linux server release tarball — produces build/linux/oblivra-server-<version>-linux-amd64.tar.gz
    deps: [build:frontend]
    vars:
      VERSION: '{{.VERSION | default "0.1.0-beta1"}}'
      STAGE: 'build/linux/oblivra-server-{{.VERSION | default "0.1.0-beta1"}}-linux-amd64'
    env:
      GOOS: linux
      GOARCH: amd64
      CGO_ENABLED: 0
    cmds:
      - go run ./tools/ensure-dir build/linux/dist
      - go build -trimpath -ldflags "-w -s -X main.version=v{{.VERSION}}" -o build/linux/dist/oblivra-server  ./cmd/server
      - go build -trimpath -ldflags "-w -s -X main.version=v{{.VERSION}}" -o build/linux/dist/oblivra-cli     ./cmd/cli
      - go build -trimpath -ldflags "-w -s -X main.version=v{{.VERSION}}" -o build/linux/dist/oblivra-verify  ./cmd/verify
      - go build -trimpath -ldflags "-w -s -X main.version=v{{.VERSION}}" -o build/linux/dist/oblivra-agent   ./cmd/agent
      - go build -trimpath -ldflags "-w -s -X main.version=v{{.VERSION}}" -o build/linux/dist/oblivra-migrate ./cmd/migrate
      - go build -trimpath -ldflags "-w -s -X main.version=v{{.VERSION}}" -o build/linux/dist/oblivra-smoke   ./cmd/smoke
      - rm -rf "{{.STAGE}}"
      - mkdir -p "{{.STAGE}}"
      - cp build/linux/dist/* "{{.STAGE}}/"
      - cp build/linux/release/install.sh build/linux/release/uninstall.sh "{{.STAGE}}/"
      - cp build/linux/release/oblivra.service build/linux/release/oblivra.env.example "{{.STAGE}}/"
      - cp build/linux/release/Caddyfile.example build/linux/release/README.md "{{.STAGE}}/"
      - cp -r sigma "{{.STAGE}}/"
      - cp LICENSE SECURITY.md "{{.STAGE}}/"
      - chmod +x "{{.STAGE}}/install.sh" "{{.STAGE}}/uninstall.sh" "{{.STAGE}}"/oblivra-*
      - tar -C build/linux -czf "build/linux/oblivra-server-{{.VERSION}}-linux-amd64.tar.gz" "oblivra-server-{{.VERSION}}-linux-amd64/"
      - 'echo "✓ build/linux/oblivra-server-{{.VERSION}}-linux-amd64.tar.gz"'

  ci:
    desc: Run the full CI gauntlet — fmt, vet, tests, frontend build
    cmds:
      - gofmt -l . | (! grep .)
      - go vet ./...
      - go test ./...
      - task: build:frontend

  # ---- Quality ----------------------------------------------------------

  test:
    desc: Run Go tests
    cmds:
      - go test ./...

  test:race:
    desc: Run Go tests with race detector
    cmds:
      - go test -race ./...

  fmt:
    desc: Format Go code
    cmds:
      - gofmt -w .
      - go vet ./...

  clean:
    desc: Remove build artifacts
    cmds:
      - go run ./tools/clean
