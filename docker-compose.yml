version: '3.8'

# OblivraShell Sovereign Stack
#
# Single-service deployment: the OBLIVRA headless server.
#
# Phase 36 broad scope cut: the external observability stack
# (Prometheus + Grafana + Grafana Tempo) was removed. Platform metrics
# and traces are now ingested directly by the OBLIVRA agent into the
# SIEM pipeline — no need for a separate scrape-and-graph layer. The
# `/metrics` endpoint on the REST API still exists (Prometheus-format)
# for operators who want to point an existing observability stack at
# OBLIVRA, but no companion containers ship by default.
#
# Usage:
#   docker-compose up -d

services:

  # ── Oblivra headless server ─────────────────────────────────────────────────
  sovereign-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sovereign-server
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "8080:8080"   # REST API & WebSocket event stream
      - "8443:8443"   # Raft consensus / private node comms
    volumes:
      - sovereign_data:/var/lib/oblivrashell/db
      - sovereign_logs:/var/lib/oblivrashell/logs
      - ./sigma:/var/lib/oblivrashell/sigma:ro   # community Sigma rules
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 64m
    environment:
      - GIN_MODE=release
      - OBLIVRA_ENV=production
    networks:
      - oblivra

networks:
  oblivra:
    driver: bridge

volumes:
  sovereign_data:
  sovereign_logs:
