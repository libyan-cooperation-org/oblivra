services:
  oblivra:
    build: .
    image: ghcr.io/libyan-cooperation-org/oblivra:latest
    container_name: oblivra
    restart: unless-stopped
    user: "65532:65532"  # nonroot from distroless
    ports:
      - "127.0.0.1:8080:8080"   # REST + UI — front this with TLS-terminating proxy
      - "1514:1514/udp"         # syslog
      - "2055:2055/udp"         # NetFlow v5
    volumes:
      - oblivra-data:/var/lib/oblivra
    environment:
      OBLIVRA_DATA_DIR: /var/lib/oblivra
      OBLIVRA_ADDR: ":8080"
      OBLIVRA_SYSLOG_ADDR: ":1514"
      OBLIVRA_NETFLOW_ADDR: ":2055"
      # Required in production. Treat OBLIVRA_AUDIT_KEY like a TLS private key.
      OBLIVRA_API_KEYS: "${OBLIVRA_API_KEYS:?must be set, e.g. ops:admin,read:readonly}"
      OBLIVRA_AUDIT_KEY: "${OBLIVRA_AUDIT_KEY:?must be set, e.g. \\$(openssl rand -hex 32)}"
    healthcheck:
      test: ["CMD", "/app/oblivra-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - oblivra
    ports:
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  oblivra-data:
  caddy-data:
  caddy-config:
