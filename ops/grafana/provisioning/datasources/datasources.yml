apiVersion: 1

datasources:
  # ── Prometheus (metrics) ───────────────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo

  # ── Tempo (distributed traces) ────────────────────────────────────────────
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      httpMethod: GET
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      traceQuery:
        timeShiftEnabled: true
        spanStartTimeShift: 1h
        spanEndTimeShift: -1h
      spanBar:
        type: Tag
        tag: http.path
      tracesToLogsV2:
        datasourceUid: prometheus
        spanStartTimeShift: 1h
        spanEndTimeShift: -1h
        tags:
          - key: service.name
            value: job
