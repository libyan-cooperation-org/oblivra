global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'oblivra'

scrape_configs:
  # Scrape Oblivra's own /metrics endpoint (Prometheus-format from MetricsCollector)
  - job_name: 'oblivrashell'
    static_configs:
      - targets: ['sovereign-server:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Scrape pprof debug metrics (goroutine, heap, GC)
  - job_name: 'oblivrashell-pprof'
    static_configs:
      - targets: ['sovereign-server:6060']
    metrics_path: '/debug/metrics'
    scrape_interval: 30s

  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape Grafana
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
    metrics_path: '/metrics'
