# Automated dependency update + CVE alerting.
#
# Closes the "still missing dependency-update automation tied to CI policy"
# audit finding. Updates land as PRs; CI runs gosec + govulncheck +
# gitleaks + the new no-fake-metrics + runtime-smoke gates against the
# updated tree, so a breaking change is caught before merge.
#
# Frequency: weekly so the queue doesn't drown reviewers, but security-
# labelled advisories run open-vulnerabilities mode (any time a
# vulnerable version is in use, a PR opens immediately).

version: 2

updates:
  # ── Go modules ────────────────────────────────────────────────────────
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "go"
    groups:
      # Group security-related dep updates so they ship as one reviewable PR.
      security:
        patterns:
          - "golang.org/x/crypto*"
          - "golang.org/x/oauth2*"
          - "github.com/coreos/go-oidc*"
          - "github.com/crewjam/saml*"
          - "github.com/golang-jwt/*"
          - "github.com/gorilla/websocket"
        update-types:
          - "minor"
          - "patch"
      # Routine dep updates batch together for low-noise weekly review.
      routine:
        patterns:
          - "*"
        exclude-patterns:
          - "golang.org/x/crypto*"
          - "golang.org/x/oauth2*"
          - "github.com/coreos/go-oidc*"
          - "github.com/crewjam/saml*"
          - "github.com/golang-jwt/*"
        update-types:
          - "minor"
          - "patch"
    # Major-version bumps go through manual review; never auto-PR them.
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # ── npm (frontend) ───────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"
    groups:
      # Svelte + xterm + Wails runtime stay together (compat tested as a set).
      runtime:
        patterns:
          - "svelte"
          - "@sveltejs/*"
          - "@xterm/*"
          - "@wailsio/*"
          - "vite"
          - "@vitejs/*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # ── GitHub Actions themselves ────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "ci"
