name: Release — Build, Sign & SBOM

# Triggers on version tags (v1.2.3) and allows manual dispatch
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.2.3)'
        required: true

permissions:
  contents: write      # create GitHub releases
  id-token: write      # sigstore OIDC token
  packages: write      # push to GHCR if needed

jobs:
  # ── 1. Build binaries ──────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: oblivrashell-linux-amd64
          - os: linux-arm64
            runner: ubuntu-latest
            goos: linux
            goarch: arm64
            binary: oblivrashell-linux-arm64
          - os: windows-amd64
            runner: windows-latest
            goos: windows
            goarch: amd64
            binary: oblivrashell-windows-amd64.exe
          - os: darwin-amd64
            runner: macos-latest
            goos: darwin
            goarch: amd64
            binary: oblivrashell-darwin-amd64
          - os: darwin-arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
            binary: oblivrashell-darwin-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # required for version stamping via git describe

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Node.js (for Wails frontend build)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bun
        run: npm install -g bun

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails@latest

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${{ github.ref_name }}"
          COMMIT="${{ github.sha }}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w \
            -X main.Version=${VERSION} \
            -X main.Commit=${COMMIT} \
            -X main.BuildDate=${BUILD_DATE}"
          go build \
            -trimpath \
            -ldflags "${LDFLAGS}" \
            -o dist/${{ matrix.binary }} \
            ./main.go

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}
          path: dist/${{ matrix.binary }}
          retention-days: 1

  # ── 2. Generate SBOM ───────────────────────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (SPDX JSON)
        run: |
          syft . \
            --output spdx-json=sbom-spdx.json \
            --output cyclonedx-json=sbom-cyclonedx.json \
            --source-name oblivrashell \
            --source-version ${{ github.ref_name }}

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom-spdx.json
            sbom-cyclonedx.json
          retention-days: 7

  # ── 3. Sign with sigstore / cosign ────────────────────────────────────────
  sign:
    name: Sign & Attest
    runs-on: ubuntu-latest
    needs: [build, sbom]

    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          merge-multiple: true
          path: dist/

      - name: Download SBOM
        uses: actions/download-artifact@v8
        with:
          name: sbom
          path: dist/

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Sign checksums file (keyless OIDC)
        # cosign keyless signing uses the GitHub Actions OIDC token.
        # No private key is stored — the identity is bound to this workflow run.
        run: |
          cosign sign-blob \
            --yes \
            --oidc-issuer https://token.actions.githubusercontent.com \
            --output-signature dist/SHA256SUMS.txt.sig \
            --output-certificate dist/SHA256SUMS.txt.pem \
            dist/SHA256SUMS.txt

      - name: Attest SBOM (SLSA provenance)
        run: |
          cosign attest-blob \
            --yes \
            --predicate dist/sbom-spdx.json \
            --type spdxjson \
            dist/SHA256SUMS.txt

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed
          path: dist/
          retention-days: 7

  # ── 4. Publish GitHub Release ─────────────────────────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: sign

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download signed artifacts
        uses: actions/download-artifact@v8
        with:
          name: signed
          path: dist/

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          # Extract the section for this version from CHANGELOG.md if it exists
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## \[?${VERSION}\]?/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          else
            NOTES="Release ${VERSION}"
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: OblivraShell ${{ github.ref_name }}
          body: |
            ${{ steps.changelog.outputs.notes }}

            ## Verification

            All binaries are signed with [sigstore/cosign](https://sigstore.dev) keyless signing.

            ### Verify a binary

            ```bash
            # 1. Install cosign
            brew install cosign   # macOS
            # or: https://docs.sigstore.dev/cosign/installation/

            # 2. Download the binary, SHA256SUMS.txt, SHA256SUMS.txt.sig, and SHA256SUMS.txt.pem

            # 3. Verify the signature
            cosign verify-blob \
              --certificate SHA256SUMS.txt.pem \
              --signature SHA256SUMS.txt.sig \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --certificate-identity-regexp "https://github.com/kingknull/oblivrashell/.github/workflows/release.yml" \
              SHA256SUMS.txt

            # 4. Verify the binary checksum
            sha256sum -c SHA256SUMS.txt --ignore-missing
            ```

            ### SBOM

            An SPDX and CycloneDX SBOM is attached to this release for supply chain compliance.
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # treat v1.0.0-beta as pre-release
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
