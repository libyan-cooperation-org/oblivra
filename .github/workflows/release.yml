# -------------------------------------------------
# OBLIVRA — Release Workflow
# Triggers on Git tags matching v*.*.* — builds cross-platform
# binaries and creates a GitHub Release with artifacts.
# -------------------------------------------------

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write
  id-token: write # Required for Cosign keyless signing

env:
  GO_VERSION: "1.24"
  NODE_VERSION: "20"

jobs:
  # ---------- Build cross-platform headless binaries ----------
  build-server:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Linux cross-compile deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu musl-dev

      - name: Build headless server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          BINARY_NAME="oblivra-server-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -trimpath -buildvcs=false \
            -ldflags="-s -w -buildid= -X main.version=${{ github.ref_name }}" \
            -o "dist/${BINARY_NAME}" ./cmd/cli

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          output-file: dist/oblivra-server-${{ matrix.goos }}-${{ matrix.goarch }}.sbom.spdx.json
          format: spdx-json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oblivra-server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  # ---------- Build Docker image ----------
  build-docker:
    runs-on: ubuntu-latest
    needs: build-server
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: docker-build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Docker image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes ghcr.io/${{ github.repository }}@${{ steps.docker-build.outputs.digest }}

      - name: Generate Docker SBOM attestation
        run: |
          cosign attest --yes --predicate <(syft ghcr.io/${{ github.repository }}:${{ github.ref_name }} -o spdx-json) \
            ghcr.io/${{ github.repository }}@${{ steps.docker-build.outputs.digest }}

  # ---------- Create GitHub Release ----------
  release:
    runs-on: ubuntu-latest
    needs: [build-server, build-docker]

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Generate checksums
        run: |
          cd dist
          sha256sum oblivra-server-* > SHA256SUMS.txt

      - name: Sign checksums (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign-blob --yes dist/SHA256SUMS.txt \
            --output-signature dist/SHA256SUMS.txt.sig \
            --output-certificate dist/SHA256SUMS.txt.cert

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/oblivra-server-*
            dist/SHA256SUMS.txt
            dist/SHA256SUMS.txt.sig
            dist/SHA256SUMS.txt.cert
          body: |
            ## OBLIVRA ${{ github.ref_name }}

            ### Installation

            **Docker (recommended):**
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            docker compose up -d
            ```

            **Binary:**
            Download the binary for your platform, then:
            ```bash
            chmod +x oblivra-server-*
            ./oblivra-server-linux-amd64 --server --data-dir /opt/oblivra
            ```

            ### Verify checksums
            ```bash
            sha256sum -c SHA256SUMS.txt
            ```

            ### Verify signature (Cosign)
            ```bash
            cosign verify-blob SHA256SUMS.txt \
              --signature SHA256SUMS.txt.sig \
              --certificate SHA256SUMS.txt.cert \
              --certificate-identity-regexp ".*github.com.*" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com
            ```

            ### Supply Chain
            - SBOM (SPDX JSON) attached per binary
            - Docker image signed with Cosign (keyless)
            - Checksums signed with Sigstore certificate
