name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write  # for SARIF upload

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
          - os: windows
            runner: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        # -unsafeptr=false disables the intra-procedural unsafe.Pointer
        # analyzer because we have one intentional uintptr→Pointer
        # conversion in `internal/memory/secure.go:osPageSlice` for OS-
        # allocated VirtualAlloc memory (NOT GC-managed). Every other
        # vet check stays on. See secure.go for the documented contract.
        run: go vet -unsafeptr=false ./...

      - name: Run tests
        run: go test -race -timeout 120s ./...

      - name: Run fuzz targets (short)
        if: matrix.os == 'linux'
        run: |
          # Run each fuzz target for 10 seconds to catch obvious issues in CI
          go test -fuzz=FuzzAutoparse -fuzztime=10s ./internal/ingest/ || true
          go test -fuzz=FuzzSigmaTranspile -fuzztime=10s ./internal/detection/ || true

  # ── Supply chain: SBOM on every PR ────────────────────────────────────────
  sbom-pr:
    name: SBOM (PR check)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom-pr.spdx.json

      - name: Scan for vulnerabilities (grype)
        uses: anchore/scan-action@v4
        with:
          sbom: sbom-pr.spdx.json
          fail-build: false          # warn only — don't block PRs on vuln hits
          output-format: sarif
          output-file: vuln-scan.sarif

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: vuln-scan.sarif

  # ── Architecture boundary enforcement ─────────────────────────────────────
  arch:
    name: Architecture constraints
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run architecture tests
        run: go test ./internal/architecture/...

  # ── Static analysis: gosec ───────────────────────────────────────────────
  # Catches the classes of bug surfaced in the Phase 25 audit:
  # InsecureSkipVerify, math/rand-as-security-source, fmt.Sprintf into SQL, etc.
  gosec:
    name: Static analysis (gosec)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run gosec
        uses: securego/gosec@master
        with:
          # Excludes:
          #   G104 (errcheck — staticcheck handles this better)
          #   G304 (file inclusion via variable — too noisy for SIEM file-tailing collectors)
          #   G601 (loop var capture — Go 1.22+ fixes the underlying issue)
          # Output SARIF for the GitHub Security tab; warn-only on PRs to avoid
          # flag-day rejection of pre-existing findings.
          args: '-no-fail -fmt=sarif -out=gosec.sarif -exclude=G104,G304,G601 ./...'
      - name: Upload gosec SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: gosec.sarif

  # ── Secrets scanning: gitleaks ───────────────────────────────────────────
  # Would have caught the dark-site URL (sync.oblivrashell.dev) before merge.
  gitleaks:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # gitleaks needs full history for blame on findings
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Pass-through; not a license — repo-scope only. Blocks PRs on detection.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true

  # ── Vulnerable Go dependencies: govulncheck ──────────────────────────────
  # Surfaces CVEs in BadgerDB, gRPC, golang.org/x/* etc. before they ship.
  govulncheck:
    name: Vulnerability scan (govulncheck)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        # Fails the job on any GO-... advisory whose vulnerable symbol is reachable
        # from our code. Use `go list ./...` so we scan every module in the tree.
        run: govulncheck ./...

  # ── Frontend regression-prevention guards (Phase 29.5 + 29.8) ───────────
  # Three grep-based checks that would have caught the four blank-screen
  # regressions encountered on 2026-04-25:
  #   1. runes ($state/$derived/$effect) outside .svelte.ts files
  #   2. `import * as` from tree-shakeable icon libraries (lucide, radix)
  #   3. components calling t(...) without importing it from @lib/i18n
  # Zero npm deps; pure bash. See frontend/scripts/lint-guards.sh.
  frontend-guards:
    name: Frontend regression guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run frontend lint-guards
        run: bash frontend/scripts/lint-guards.sh

  # ── Frontend bundle smoke test (Phase 29.7 + Phase 31) ──────────────────
  # Builds the production bundle and validates that:
  #   - vite build succeeds
  #   - dist/ has index.html + assets that reference each other
  #   - every Phase 30/31 component fingerprint shows up in the JS bundle
  #     (catches tree-shake regressions like the v1.5.0 lucide-svelte one)
  #   - critical lucide icons are present
  #   - severity color tokens shipped in the CSS bundle
  #   - bundle size is within sane bounds
  # Closes the audit's "must run against COMPILED output" gap.
  frontend-smoke:
    name: Frontend bundle smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --no-audit --no-fund
      - name: Run smoke test
        run: bash frontend/scripts/smoke-test.sh

  # ── Runtime smoke: start server, hit /healthz and /readyz ─────────────
  # The frontend bundle smoke catches build regressions; this catches
  # *runtime* regressions (e.g. a service Start() that panics on first
  # boot, a migration that silently fails, a port-binding collision).
  # A 30-second smoke is fast and catches a class of bug build-only
  # checks miss every time.
  runtime-smoke:
    name: Runtime smoke (server boot + /healthz)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build server
        run: go build -o /tmp/oblivra-server ./cmd/server
      - name: Start server in background
        run: |
          /tmp/oblivra-server --port 18443 --data-dir /tmp/oblivra-data &
          echo $! > /tmp/oblivra-server.pid
          # Give services up to 20s to reach Ready (DB migration, vault
          # init, cert-manager, alerting subscriber, etc.).
          for i in $(seq 1 20); do
            sleep 1
            if curl -sSf http://127.0.0.1:18443/healthz >/dev/null 2>&1; then
              echo "[runtime-smoke] healthz green after ${i}s"
              exit 0
            fi
          done
          echo "[runtime-smoke] /healthz never returned 200"
          kill $(cat /tmp/oblivra-server.pid) 2>/dev/null || true
          exit 1
      - name: Probe /readyz
        run: |
          curl -sSf http://127.0.0.1:18443/readyz | head -c 200
      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/oblivra-server.pid ]; then
            kill $(cat /tmp/oblivra-server.pid) 2>/dev/null || true
          fi

  # ── No-fake-metrics regression ────────────────────────────────────────
  # Catches the operator-deception class of bug we keep seeing: hardcoded
  # demo numbers like "4.2s MTTD", "99.9999% SLA", "EVD-044", "08:12" SLA
  # countdowns, or "97/72" risk scores. If any of these tokens reappear
  # in the wired pages directory, fail the build — they should ONLY ever
  # come from real backend data.
  no-fake-metrics:
    name: No-fake-metrics regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Search for known demo-data fingerprints
        run: |
          # Each pattern is a fingerprint of a previous regression. New
          # additions are welcome — they prevent the same lie from
          # shipping twice.
          BAD_PATTERNS=(
            "EVD-044"
            "HOST-FIN-044"
            "99.9999% SLA"
            "4.2s'"
            "08:12"
            "'97' : '72'"
            "'8.4'"
            "'2.1'"
          )
          FAIL=0
          for pat in "${BAD_PATTERNS[@]}"; do
            if grep -RIn --include="*.svelte" --include="*.ts" "$pat" frontend/src/pages/ frontend/src/components/ 2>/dev/null; then
              echo "::error::Fake-metric fingerprint found: $pat"
              FAIL=1
            fi
          done
          if [ "$FAIL" = "1" ]; then
            echo "::error::no-fake-metrics regression — see hits above"
            exit 1
          fi
          echo "[no-fake-metrics] clean"
