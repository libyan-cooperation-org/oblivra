id: "persistence_ssh_authorized_keys"
name: "SSH Authorized Keys Modified"
description: "Detects modifications to SSH authorized_keys files, a common persistence mechanism allowing key-based backdoor access."
severity: "high"
type: "threshold"
threshold: 1
window_sec: 60
dedup_window_sec: 3600
mitre_tactics:
  - "TA0003"
mitre_techniques:
  - "T1098"
conditions:
  EventType: "file_modified"
  output_contains: "authorized_keys"
