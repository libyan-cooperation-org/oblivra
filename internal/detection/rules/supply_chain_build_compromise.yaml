id: "supply_chain_build_compromise"
name: "Build System Compromise Indicator"
description: >
  Detects indicators of build system compromise: unexpected network connections
  from CI/CD runners, modification of build scripts outside normal pipeline,
  or new credentials injected into build environments.
severity: "critical"
type: "threshold"
threshold: 1
window_sec: 300
dedup_window_sec: 3600
mitre_tactics:
  - "TA0001"
  - "TA0003"
mitre_techniques:
  - "T1195.002"
  - "T1072"
conditions:
  EventType: "linux_process_create"
  ParentProcess|contains|any:
    - "jenkins"
    - "gitlab-runner"
    - "github-actions"
    - "buildkite-agent"
  CommandLine|contains|any:
    - "curl http"
    - "wget http"
    - "nc -e"
    - "bash -i"
    - "/dev/tcp/"
logsource:
  product: linux
  service: auditd
