id: "windows_golden_ticket"
name: "Kerberos Golden Ticket Indicator"
description: >
  Detects golden ticket usage: Kerberos TGT with anomalous ticket lifetime
  (>10 hours), use of non-existent user accounts, or service ticket requests
  from krbtgt-derived tickets with mismatched SIDs.
severity: "critical"
type: "threshold"
threshold: 1
window_sec: 60
dedup_window_sec: 3600
mitre_tactics:
  - "TA0006"
  - "TA0008"
mitre_techniques:
  - "T1558.001"
conditions:
  EventType: "windows_kerberos"
  EventID: "4769"
  TicketEncryptionType: "0x17"
  ServiceName|not|contains: "$"
logsource:
  product: windows
  service: security
  category: kerberos
