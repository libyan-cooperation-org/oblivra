id: "linux_docker_escape"
name: "Docker Container Escape Attempt"
description: >
  Detects common container escape techniques: mounting the host filesystem,
  accessing /proc/sysrq-trigger, use of --privileged flag, or nsenter to
  break out of container namespace isolation.
severity: "critical"
type: "threshold"
threshold: 1
window_sec: 30
dedup_window_sec: 3600
mitre_tactics:
  - "TA0004"
  - "TA0005"
mitre_techniques:
  - "T1611"
conditions:
  EventType: "linux_process_create"
  CommandLine|contains|any:
    - "nsenter --target 1 --mount --uts --ipc --net --pid"
    - "nsenter -t 1 -m -u -i -n -p"
    - "mount /dev/sd"
    - "chroot /host"
    - "/proc/sysrq-trigger"
    - "docker run --privileged"
    - "docker run -v /:/host"
logsource:
  product: linux
  service: auditd
