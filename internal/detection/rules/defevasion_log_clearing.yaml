id: "defense_evasion_log_clearing"
name: "Event Log Cleared"
description: "Detects clearing of Windows Event Logs or Linux syslog, a critical indicator of evidence destruction."
severity: "critical"
type: "threshold"
threshold: 1
window_sec: 30
dedup_window_sec: 3600
mitre_tactics:
  - "TA0005"
mitre_techniques:
  - "T1070"
conditions:
  EventType: "regex:(log_cleared|windows_event_1102|audit_log_purged)"
