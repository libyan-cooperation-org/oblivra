id: "windows_dcsync_attack"
name: "DCSync Attack (Domain Controller Replication)"
description: >
  Detects DCSync attacks where a non-DC account requests AD replication
  (GetNCChanges / GetChangesAll) to dump all domain credentials.
  Used by Mimikatz dcsync, Impacket secretsdump. A catastrophic event if detected.
severity: "critical"
type: "threshold"
threshold: 1
window_sec: 60
dedup_window_sec: 3600
mitre_tactics:
  - "TA0006"
mitre_techniques:
  - "T1003.006"
conditions:
  EventType: "windows_ad_replication"
  AccessMask|contains|any:
    - "0x100"
    - "0x200"
  SubjectUserName|not|contains:
    - "$"
logsource:
  product: windows
  service: security
  category: ds_access
