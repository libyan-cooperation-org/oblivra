id: "collection_local_staging"
name: "Local Data Staging"
description: "Detects rapid file copies to a local staging directory, potentially in preparation for data exfiltration."
severity: "medium"
type: "frequency"
threshold: 20
window_sec: 120
dedup_window_sec: 1800
mitre_tactics:
  - "TA0009"
mitre_techniques:
  - "T1074"
group_by: ["source_ip"]
conditions:
  EventType: "file_copy"
