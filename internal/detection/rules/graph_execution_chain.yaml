id: G-EXEC-001
name: Graph Process Execution Chain — User → Host → Suspicious Process
type: graph
severity: critical
version: "1.0.0"
description: >
  A user authenticated to a host and that host spawned a process containing
  a known offensive tool or interpreter keyword (powershell, cmd, bash, nc,
  python, mshta, wscript, cscript, rundll32). Combined with a network
  connection edge in the same context, this represents a full execution-to-C2
  kill-chain segment observable at the entity relationship layer.

mitre_tactics:
  - TA0002   # Execution
  - TA0011   # Command and Control

mitre_techniques:
  - T1059    # Command and Scripting Interpreter
  - T1059.001 # PowerShell
  - T1059.003 # Windows Command Shell

conditions:
  node_types: "user,host,process"
  edge_types: "authenticated_to,spawned"
  min_path_len: "3"
  # The process node must have a CommandLine containing a known interpreter
  node_condition.CommandLine: "powershell"

window_sec: 120
dedup_window_sec: 60

is_global: false
