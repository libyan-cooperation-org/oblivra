id: "collection_archive_staged"
name: "Data Staged in Archive"
description: "Detects creation of archive files (zip, tar, 7z, rar) in staging directories prior to potential exfiltration."
severity: "medium"
type: "threshold"
threshold: 1
window_sec: 120
dedup_window_sec: 3600
mitre_tactics:
  - "TA0009"
mitre_techniques:
  - "T1560"
conditions:
  EventType: "file_created"
  output_contains: "regex:\\.(zip|tar|gz|7z|rar|cab)$"
