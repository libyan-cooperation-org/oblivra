id: "cloud_aws_iam_privilege_escalation"
name: "AWS IAM Privilege Escalation"
description: >
  Detects IAM actions that can lead to privilege escalation: attaching AdministratorAccess
  policies, creating new admin users, or passing roles with elevated permissions.
  A critical cloud security event.
severity: "critical"
type: "threshold"
threshold: 1
window_sec: 120
dedup_window_sec: 1800
mitre_tactics:
  - "TA0004"
mitre_techniques:
  - "T1078.004"
  - "T1098"
conditions:
  EventType: "aws_cloudtrail"
  EventName|contains|any:
    - "AttachUserPolicy"
    - "AttachRolePolicy"
    - "PutUserPolicy"
    - "CreatePolicyVersion"
    - "SetDefaultPolicyVersion"
    - "PassRole"
  RequestParameters|contains: "AdministratorAccess"
logsource:
  product: aws
  service: cloudtrail
