id: "lateral_rdp_brute_force"
name: "RDP Brute Force Lateral Movement"
description: "Detects multiple failed RDP login attempts followed by a successful login from an internal IP, indicating lateral movement."
severity: "critical"
type: "sequence"
window_sec: 300
dedup_window_sec: 3600
mitre_tactics:
  - "TA0008"
mitre_techniques:
  - "T1021"
group_by: ["source_ip"]
sequence:
  - step_id: "rdp_fail1"
    conditions:
      EventType: "windows_login_failed"
  - step_id: "rdp_fail2"
    conditions:
      EventType: "windows_login_failed"
  - step_id: "rdp_success"
    conditions:
      EventType: "windows_login_success"
