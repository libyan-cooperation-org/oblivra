id: "network_firewall_sweep"
name: "Firewall Drop Sweep"
description: "Detects an aggressive port scanning or scraping behavior by tracking multiple rapid connection drops at the perimeter firewall from a single source IP."
severity: "medium"
type: "frequency"
threshold: 25
window_sec: 15
dedup_window_sec: 600
mitre_tactics:
  - "TA0007" # Discovery
mitre_techniques:
  - "T1046" # Network Service Discovery
group_by: ["source_ip"]
conditions:
  EventType: "network_connection_blocked"
