id: "network_dns_tunnel"
name: "DNS Tunneling / C2 over DNS"
description: >
  Detects DNS tunneling indicators: unusually long DNS query names (>60 chars),
  high query rate to a single domain, or use of uncommon DNS record types
  (TXT, NULL, CNAME) for data exfiltration or C2 communication.
severity: "high"
type: "threshold"
threshold: 50
window_sec: 60
dedup_window_sec: 900
mitre_tactics:
  - "TA0011"
  - "TA0010"
mitre_techniques:
  - "T1071.004"
  - "T1132.001"
conditions:
  EventType: "network_dns"
  QueryType|contains|any:
    - "TXT"
    - "NULL"
logsource:
  product: zeek
  service: dns
