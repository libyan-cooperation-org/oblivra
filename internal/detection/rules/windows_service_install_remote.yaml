id: "windows_service_install_remote"
name: "Remote Windows Service Installation"
description: >
  Detects remote service creation over SCM (Service Control Manager) — the
  primary mechanism used by PsExec, Metasploit, and Cobalt Strike for remote
  code execution after credential compromise.
severity: "high"
type: "threshold"
threshold: 1
window_sec: 60
dedup_window_sec: 1800
mitre_tactics:
  - "TA0008"
  - "TA0002"
mitre_techniques:
  - "T1543.003"
  - "T1569.002"
conditions:
  EventType: "windows_service_install"
  EventID: "7045"
  ServiceFileName|contains|any:
    - "%TEMP%"
    - "C:\\Windows\\Temp"
    - "\\AppData\\Local\\Temp"
    - "cmd.exe /c"
    - "powershell.exe"
logsource:
  product: windows
  service: system
