id: "windows_lsass_dump"
name: "LSASS Memory Dump Attempt"
description: >
  Detects attempts to dump LSASS memory using common tools: ProcDump, Task Manager,
  comsvcs.dll MiniDump, or direct handle access. LSASS dumps yield NTLM hashes
  and Kerberos tickets for lateral movement.
severity: "critical"
type: "threshold"
threshold: 1
window_sec: 30
dedup_window_sec: 3600
mitre_tactics:
  - "TA0006"
mitre_techniques:
  - "T1003.001"
conditions:
  EventType: "windows_process_create"
  CommandLine|contains|any:
    - "procdump.exe -ma lsass"
    - "procdump64.exe -ma lsass"
    - "comsvcs.dll, MiniDump"
    - "comsvcs.dll MiniDump"
    - "sekurlsa::minidump"
    - "sekurlsa::logonpasswords"
    - "lsass.exe /dump"
logsource:
  product: windows
  service: sysmon
  category: process_creation
