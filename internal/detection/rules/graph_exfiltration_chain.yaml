id: G-EXFIL-001
name: Graph Exfiltration Chain — Host Connected to External IP After File Access
type: graph
severity: critical
version: "1.0.0"
description: >
  A host accessed a sensitive file (via user file-access edge) and subsequently
  established an outbound network connection to an external IP within the window.
  This models the data-staging-then-exfiltration kill-chain segment at the
  entity relationship layer, catching exfil attempts that evade per-event rules
  because the file access and network connection occur as separate log entries.

mitre_tactics:
  - TA0010   # Exfiltration
  - TA0009   # Collection

mitre_techniques:
  - T1041    # Exfiltration Over C2 Channel
  - T1560    # Archive Collected Data

conditions:
  node_types: "user,host,ip"
  edge_types: "accessed,connected_to"
  min_path_len: "3"
  edge_threshold.accessed: "1"
  edge_threshold.connected_to: "1"

window_sec: 600
dedup_window_sec: 300

is_global: true
