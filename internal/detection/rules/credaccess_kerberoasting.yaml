id: "credaccess_kerberoasting"
name: "Kerberoasting Attack"
description: "Detects excessive Kerberos TGS ticket requests for service accounts, a hallmark of Kerberoasting attacks."
severity: "high"
type: "frequency"
threshold: 10
window_sec: 60
dedup_window_sec: 3600
mitre_tactics:
  - "TA0006"
mitre_techniques:
  - "T1558"
group_by: ["source_ip"]
conditions:
  EventType: "kerberos_tgs_request"
