id: "exfiltration_cloud_storage"
name: "Exfiltration to Cloud Storage"
description: "Detects upload of data to external cloud storage services such as S3, Azure Blob, Google Cloud Storage, or Mega."
severity: "high"
type: "frequency"
threshold: 5
window_sec: 300
dedup_window_sec: 3600
mitre_tactics:
  - "TA0010"
mitre_techniques:
  - "T1567"
group_by: ["source_ip"]
conditions:
  EventType: "http_upload"
  output_contains: "regex:(s3\\.amazonaws|blob\\.core\\.windows|storage\\.googleapis|mega\\.nz)"
