id: "ot_modbus_anomaly"
name: "Modbus/ICS Protocol Anomaly"
description: >
  Detects anomalous Modbus TCP traffic indicative of OT/ICS reconnaissance or
  manipulation: function code 8 (diagnostics), 90/91 (Enron extensions),
  or write operations to coils/registers from non-engineering workstation IPs.
severity: "critical"
type: "threshold"
threshold: 1
window_sec: 60
dedup_window_sec: 1800
mitre_tactics:
  - "TA0040"
  - "TA0007"
mitre_techniques:
  - "T0831"
  - "T0855"
conditions:
  EventType: "network_modbus"
  FunctionCode|contains|any:
    - "5"
    - "6"
    - "15"
    - "16"
    - "90"
    - "91"
logsource:
  product: zeek
  service: modbus
