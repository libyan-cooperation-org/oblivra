id: "network_beaconing"
name: "Periodic C2 Beaconing Detected"
description: >
  Detects periodic outbound connections to the same external IP/domain at regular
  intervals — the hallmark of C2 beacon behavior. Malware beacons range from
  every 30 seconds to every 4 hours with jitter. Triggered on 10+ connections
  to the same external host within 10 minutes.
severity: "high"
type: "threshold"
threshold: 10
window_sec: 600
dedup_window_sec: 1800
mitre_tactics:
  - "TA0011"
mitre_techniques:
  - "T1071.001"
  - "T1571"
conditions:
  EventType: "network_connection"
  Direction: "outbound"
  DestPort|contains|any:
    - "443"
    - "80"
    - "8080"
    - "8443"
    - "4444"
    - "1337"
logsource:
  product: zeek
  service: conn
