id: "discovery_account_enum"
name: "Account Enumeration"
description: "Detects enumeration of user accounts via net user, wmic, ldapsearch, or similar commands."
severity: "medium"
type: "frequency"
threshold: 5
window_sec: 60
dedup_window_sec: 600
mitre_tactics:
  - "TA0007"
mitre_techniques:
  - "T1087"
group_by: ["source_ip"]
conditions:
  EventType: "process_execution"
  output_contains: "regex:(net user|net localgroup|wmic useraccount|ldapsearch|getent passwd)"
