id: "supply_chain_npm_suspicious"
name: "Suspicious NPM Package Script Execution"
description: >
  Detects npm postinstall/preinstall scripts spawning unexpected network connections
  or system commands. Supply chain attacks via malicious npm packages frequently
  use lifecycle scripts to execute payloads during install.
severity: "high"
type: "threshold"
threshold: 1
window_sec: 120
dedup_window_sec: 3600
mitre_tactics:
  - "TA0001"
  - "TA0002"
mitre_techniques:
  - "T1195.001"
  - "T1059"
conditions:
  EventType: "linux_process_create"
  ParentProcess|contains: "npm"
  CommandLine|contains|any:
    - "curl "
    - "wget "
    - "nc "
    - "ncat "
    - "python -c"
    - "python3 -c"
    - "eval("
    - "base64 -d"
logsource:
  product: linux
  service: auditd
