id: "linux_kernel_module_load"
name: "Unsigned Kernel Module Loaded"
description: >
  Detects loading of kernel modules via insmod or modprobe, particularly those
  that are not in the standard module path. Kernel module loading is a privileged
  operation that can grant full ring-0 access.
severity: "high"
type: "threshold"
threshold: 1
window_sec: 60
dedup_window_sec: 3600
mitre_tactics:
  - "TA0005"
  - "TA0003"
mitre_techniques:
  - "T1547.006"
conditions:
  EventType: "linux_process_create"
  CommandLine|contains|any:
    - "insmod /"
    - "modprobe "
  CommandLine|not|contains:
    - "/lib/modules"
logsource:
  product: linux
  service: auditd
