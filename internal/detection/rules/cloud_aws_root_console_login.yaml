id: "cloud_aws_root_console_login"
name: "AWS Root Account Console Login"
description: >
  Detects any console login using the AWS root account. Root account usage
  should be exceptional and is a critical security event. All routine operations
  should use IAM roles. Root login may indicate account takeover or insider threat.
severity: "critical"
type: "threshold"
threshold: 1
window_sec: 300
dedup_window_sec: 3600
mitre_tactics:
  - "TA0001"
  - "TA0004"
mitre_techniques:
  - "T1078.004"
conditions:
  EventType: "aws_cloudtrail"
  EventName: "ConsoleLogin"
  UserIdentityType: "Root"
logsource:
  product: aws
  service: cloudtrail
