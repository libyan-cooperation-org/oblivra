id: "windows_shadow_copy_deletion"
name: "Shadow Copy Deletion"
description: >
  Detects deletion of Windows Volume Shadow Copies via vssadmin, wmic, or
  PowerShell. This is a critical ransomware precursor — destruction of backups
  prevents recovery. Alert immediately.
severity: "critical"
type: "threshold"
threshold: 1
window_sec: 30
dedup_window_sec: 3600
mitre_tactics:
  - "TA0040"
mitre_techniques:
  - "T1490"
conditions:
  EventType: "windows_process_create"
  CommandLine|contains|any:
    - "vssadmin.exe delete shadows"
    - "vssadmin delete shadows"
    - "wmic shadowcopy delete"
    - "wbadmin delete catalog"
    - "bcdedit /set recoveryenabled no"
    - "bcdedit.exe /set {default} recoveryenabled no"
    - "Get-WmiObject Win32_ShadowCopy"
logsource:
  product: windows
  service: sysmon
  category: process_creation
