id: "credaccess_browser_credential_theft"
name: "Browser Credential Theft"
description: "Detects access to browser credential stores (Chrome Login Data, Firefox logins.json) for password extraction."
severity: "high"
type: "threshold"
threshold: 1
window_sec: 30
dedup_window_sec: 3600
mitre_tactics:
  - "TA0006"
mitre_techniques:
  - "T1555"
conditions:
  EventType: "file_access"
  output_contains: "regex:(Login Data|logins\\.json|key[34]\\.db|cookies\\.sqlite)"
