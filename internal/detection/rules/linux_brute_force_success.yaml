id: "linux_brute_force_success"
name: "Successful SSH Logon After Brute Force"
description: "Detects an attacker successfully authenticating via SSH immediately following multiple failed attempts from the same IP address."
severity: "critical"
type: "sequence"
window_sec: 600
dedup_window_sec: 3600
mitre_tactics:
  - "TA0006" # Credential Access
  - "TA0001" # Initial Access
mitre_techniques:
  - "T1110" # Brute Force
  - "T1078" # Valid Accounts
group_by: ["source_ip"]
sequence:
  - step_id: "fail1"
    conditions:
      EventType: "failed_login"
  - step_id: "fail2"
    conditions:
      EventType: "failed_login"
  - step_id: "fail3"
    conditions:
      EventType: "failed_login"
  - step_id: "success"
    conditions:
      EventType: "successful_login"
