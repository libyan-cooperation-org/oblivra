id: "lateral_tainted_share"
name: "Tainted Network Share Content"
description: "Detects modification of executable content on network shares, potentially used to spread malware laterally."
severity: "high"
type: "threshold"
threshold: 1
window_sec: 60
dedup_window_sec: 3600
mitre_tactics:
  - "TA0008"
mitre_techniques:
  - "T1080"
conditions:
  EventType: "smb_write"
  output_contains: "regex:\\.(exe|dll|bat|ps1|vbs|js|scr)$"
