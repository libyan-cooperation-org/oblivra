id: "discovery_remote_system"
name: "Remote System Discovery"
description: "Detects use of network scanning or enumeration tools to discover remote systems on the network."
severity: "medium"
type: "frequency"
threshold: 3
window_sec: 120
dedup_window_sec: 1800
mitre_tactics:
  - "TA0007"
mitre_techniques:
  - "T1018"
group_by: ["source_ip"]
conditions:
  EventType: "process_execution"
  output_contains: "regex:(nmap|ping -c|arp -a|nbtscan|Net\\.Dns|Test-Connection)"
