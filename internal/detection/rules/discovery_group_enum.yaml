id: "discovery_group_enum"
name: "Permission Group Enumeration"
description: "Detects enumeration of permission groups via net group, groups, or Active Directory queries."
severity: "low"
type: "frequency"
threshold: 5
window_sec: 60
dedup_window_sec: 600
mitre_tactics:
  - "TA0007"
mitre_techniques:
  - "T1069"
group_by: ["source_ip"]
conditions:
  EventType: "process_execution"
  output_contains: "regex:(net group|net localgroup|groups|Get-ADGroup)"
