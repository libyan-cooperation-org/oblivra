id: "windows_wmi_lateral"
name: "WMI Remote Execution (Lateral Movement)"
description: >
  Detects WMI being used for remote command execution — a common lateral movement
  technique that bypasses many endpoint controls because WMI is a legitimate
  Windows management interface.
severity: "high"
type: "threshold"
threshold: 1
window_sec: 60
dedup_window_sec: 1800
mitre_tactics:
  - "TA0008"
  - "TA0002"
mitre_techniques:
  - "T1047"
  - "T1021.006"
conditions:
  EventType: "windows_process_create"
  CommandLine|contains|any:
    - "wmic /node:"
    - "wmic.exe /node:"
    - "Invoke-WmiMethod"
    - "Invoke-CimMethod"
    - "[wmiclass]"
    - "win32_process.Create"
logsource:
  product: windows
  service: sysmon
  category: process_creation
