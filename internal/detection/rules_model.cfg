SPECIFICATION Spec

\* ── Safety Invariants ──────────────────────────────────────────────────────
INVARIANT NoSpuriousAlerts
INVARIANT WindowStateInvariant

\* ── Model Constants ────────────────────────────────────────────────────────
\* 3-step brute-force-then-success sequence, 10s window, 5 event bound.
\* State space: ~200 distinct states — fully exhausted by TLC in <5s.
CONSTANTS
    Steps = << "fail1", "fail2", "success" >>
    WindowSize = 10
    MaxEvents = 5

\* ── TLC Worker Threads ──────────────────────────────────────────────────────
WORKERS 4
