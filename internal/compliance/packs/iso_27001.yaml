id: iso-27001-2022
name: ISO/IEC 27001:2022
version: "2022"
description: Information Security Management Systems
category: international

controls:
  - id: "A.5.1"
    title: "Policies for Information Security"
    checks:
      - type: compliance_pack_loaded
        description: "Information security policy framework is loaded"

  - id: "A.5.15"
    title: "Access Control"
    checks:
      - type: rbac_enabled
        description: "Role-based access controls are enforced"

  - id: "A.5.17"
    title: "Authentication Information"
    checks:
      - type: encryption_enabled
        description: "Authentication credentials are encrypted at rest"
      - type: mfa_enabled
        description: "Multi-factor authentication is available"

  - id: "A.8.5"
    title: "Secure Authentication"
    checks:
      - type: failed_login_threshold
        description: "Failed logon attempt limits are configured"
        params:
          max_failures: 5
          window_minutes: 15
      - type: tls_enabled
        description: "Secure authentication channels (TLS)"

  - id: "A.8.9"
    title: "Configuration Management"
    checks:
      - type: audit_log_exists
        description: "Configuration changes are audited"
        params:
          event_types: ["config_change"]

  - id: "A.8.15"
    title: "Logging"
    checks:
      - type: audit_log_exists
        description: "Activities, exceptions, and security events are logged"
        params:
          event_types: ["*"]
      - type: min_log_retention_days
        description: "Logs retained for minimum 180 days"
        params:
          days: 180

  - id: "A.8.16"
    title: "Monitoring Activities"
    checks:
      - type: alerting_enabled
        description: "Anomalous behaviour is detected and alerted"

  - id: "A.8.17"
    title: "Clock Synchronization"
    checks:
      - type: audit_log_exists
        description: "Timestamps in audit logs use consistent time source"
        params:
          event_types: ["*"]

  - id: "A.5.28"
    title: "Collection of Evidence"
    checks:
      - type: evidence_locker_available
        description: "Forensic evidence collection capability exists"
      - type: merkle_integrity_valid
        description: "Evidence integrity is cryptographically verifiable"
