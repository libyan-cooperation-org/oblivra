id: gdpr-article-32
name: GDPR Article 32
version: "2016"
description: Security of Processing — Technical and Organisational Measures
category: privacy

controls:
  - id: "Art.32.1.a"
    title: "Pseudonymisation and Encryption"
    checks:
      - type: encryption_enabled
        description: "Personal data is encrypted at rest and in transit"
      - type: tls_enabled
        description: "Data in transit is protected via TLS"

  - id: "Art.32.1.b"
    title: "Confidentiality, Integrity, Availability"
    checks:
      - type: rbac_enabled
        description: "Access to personal data is restricted by role"
      - type: merkle_integrity_valid
        description: "Data integrity is cryptographically provable"
      - type: alerting_enabled
        description: "Availability monitoring is active"

  - id: "Art.32.1.c"
    title: "Restore Availability"
    checks:
      - type: audit_log_exists
        description: "Backup and recovery events are logged"
        params:
          event_types: ["backup_created", "restore_completed"]

  - id: "Art.32.1.d"
    title: "Regular Testing"
    checks:
      - type: compliance_pack_loaded
        description: "Security measures are regularly tested and evaluated"

  - id: "Art.30"
    title: "Records of Processing Activities"
    checks:
      - type: audit_log_exists
        description: "Processing activities are recorded in audit log"
        params:
          event_types: ["*"]
      - type: min_log_retention_days
        description: "Processing records retained for minimum 365 days"
        params:
          days: 365

  - id: "Art.33"
    title: "Breach Notification"
    checks:
      - type: alerting_enabled
        description: "Data breach detection and notification capability exists"
