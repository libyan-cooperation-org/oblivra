SPECIFICATION Spec

\* ── Safety Invariants (checked exhaustively) ────────────────────────────────
INVARIANT TypeInvariant
INVARIANT Determinism
INVARIANT NoHashCollision
INVARIANT ReplayConsistency
INVARIANT AllRecordsWellTyped

\* ── Temporal / Liveness Property ────────────────────────────────────────────
PROPERTY EventualExecution

\* ── Immutability (temporal action constraint) ────────────────────────────────
PROPERTY Immutability

\* ── Model Constants (small but non-trivial state space) ─────────────────────
CONSTANTS
    Actions      = {"block_ip", "isolate_host", "disable_user"}
    PolicyHashes = {"policy_v1", "policy_v2"}
    InputHashes  = {"input_a", "input_b", "input_c"}
    MaxExecutions = 4

\* ── TLC Configuration ───────────────────────────────────────────────────────
\* State space:
\*   3 actions × 2 policy hashes × 3 input hashes = 18 possible triples
\*   MaxExecutions=4 keeps the explored graph bounded to ~1,000 states
\*   All 5 invariants + 2 temporal properties are checked on every state
