title: OBLIVRA agent tampering (counter-forensic)
id: cf-oblivra-agent-tamper
description: |
  Stops, masks, or removes the OBLIVRA forwarder before launching the
  rest of an attack. Watch for systemd unit manipulation, Windows service
  removal, and direct kills against the agent process.
status: stable
level: critical
logsource:
  category: process_creation
detection:
  selection_linux:
    CommandLine|contains:
      - 'systemctl stop oblivra-agent'
      - 'systemctl disable oblivra-agent'
      - 'systemctl mask oblivra-agent'
      - 'pkill -9 oblivra-agent'
      - 'killall -9 oblivra-agent'
      - 'rm -f /usr/local/bin/oblivra-agent'
      - 'rm -rf /var/lib/oblivra'
  selection_windows:
    CommandLine|contains:
      - 'sc.exe stop OblivraAgent'
      - 'sc.exe delete OblivraAgent'
      - 'sc.exe config OblivraAgent start= disabled'
      - 'taskkill /IM oblivra-agent.exe /F'
      - 'Stop-Service OblivraAgent'
  condition: 1 of selection_*
tags:
  - attack.defense_evasion
  - attack.t1562.001
  - attack.t1489
falsepositives:
  - Operator-led upgrade or reinstall (cross-check with change ticket)
