title: Bash history purge (counter-forensic)
id: cf-bash-history-purge
description: |
  Truncating, redirecting, or unsetting bash/zsh history is a classic
  cover-tracks move. We catch the four shapes attackers use most: HISTFILE
  unset, /dev/null redirection, history -c, and direct truncation of the
  history file.
status: stable
level: high
logsource:
  product: linux
  category: process_creation
detection:
  selection:
    CommandLine|contains:
      - 'unset HISTFILE'
      - 'export HISTFILE=/dev/null'
      - 'HISTSIZE=0'
      - 'history -c'
      - '> ~/.bash_history'
      - '> /root/.bash_history'
      - 'rm -f ~/.bash_history'
      - 'rm -f /root/.bash_history'
  condition: selection
tags:
  - attack.defense_evasion
  - attack.t1070.003
falsepositives:
  - CI runners that disable history for hygiene
