title: Post-Exploitation Discovery Commands
id: a8d5e0f1-2c3d-4e5f-9a1b-c2d3e4f5a6b7
description: Detect Post-exploitation discovery commands often executed by attackers after gaining initial access.
status: stable
author: OBLIVRA Core
level: medium
logsource:
    category: process_creation
detection:
    selection:
        output_contains:
            - 'whoami'
            - 'net user'
            - 'net localgroup'
            - 'nltest /dclist'
            - 'ipconfig /all'
            - 'systeminfo'
    condition: selection
falsepositives:
    - Normal administrative activity
    - Troubleshooting scripts
tags:
    - attack.discovery
    - attack.t1033
    - attack.t1087
