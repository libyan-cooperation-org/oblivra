title: Potential Ransomware Activity - High Velocity File Deletion
id: d4f5e6a7-b8c9-4d0e-9f1b-a2b3c4d5e6f7
description: Detects a high number of file deletion events from a single host within a short window, which may indicate ransomware activity.
status: stable
author: OBLIVRA Core
level: critical
logsource:
    category: file_event
detection:
    selection:
        EventType: file_delete
    timeframe: 1m
    condition: selection
threshold: 50
group_by:
    - host
falsepositives:
    - Batch cleanup scripts
    - Uninstalling large software packages
tags:
    - attack.impact
    - attack.t1485
